name: Deploy Blog to Aliyun

# 触发条件：当你将代码 push 到 master 分支时触发
on:
  push:
    branches:
      - master 

jobs:
  build-and-deploy:
    # 使用最新的 Ubuntu 服务器环境
    runs-on: ubuntu-latest 

    steps:
    # 1. 拉取源码
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. 安装 pnpm（与项目 package.json 中的版本保持一致）
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9.0.6

    # 3. 设置 Node.js 环境并开启 pnpm 缓存提高构建速度
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'pnpm'

    # 4. 执行安装和打包
    - name: Install and Build
      run: |
        pnpm install
        pnpm run build

    # 5. 将打包后的 dist 目录安全部署到阿里云服务器
    - name: Deploy to Aliyun Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: root
        key: ${{ secrets.SERVER_SSH_KEY }}
        # 打包后生成的文件夹名字
        source: "dist/*" 
        # ⚠️ 请确保此路径与你服务器 Nginx 的 root 配置一致
        target: "/var/www/myblog/" 
        # 剥离外面那层 dist 文件夹，直接把里面的内容放进 target 目录
        strip_components: 1
